services:

  dynamodb-local:
    image: amazon/dynamodb-local:latest
    container_name: dynamodb-local
    ports:
      - "8000:8000"
    command: ["-jar", "DynamoDBLocal.jar", "-sharedDb", "-inMemory"]

  dynamodb-setup:
    image: amazon/aws-cli:latest
    container_name: dynamodb-setup
    depends_on:
      - dynamodb-local
    environment:
      - AWS_ACCESS_KEY_ID=local
      - AWS_SECRET_ACCESS_KEY=local
      - AWS_DEFAULT_REGION=us-east-1
    entrypoint: ["/bin/sh", "-c", "sleep 8 && aws dynamodb create-table --table-name Users --attribute-definitions AttributeName=email,AttributeType=S --key-schema AttributeName=email,KeyType=HASH --billing-mode PAY_PER_REQUEST --endpoint-url http://dynamodb-local:8000 && aws dynamodb create-table --table-name Spaces --attribute-definitions AttributeName=spaceId,AttributeType=S --key-schema AttributeName=spaceId,KeyType=HASH --billing-mode PAY_PER_REQUEST --endpoint-url http://dynamodb-local:8000 && aws dynamodb create-table --table-name Reservations --attribute-definitions AttributeName=reservationId,AttributeType=S --key-schema AttributeName=reservationId,KeyType=HASH --billing-mode PAY_PER_REQUEST --endpoint-url http://dynamodb-local:8000 && echo 'Tablas creadas exitosamente'"]

  auth-service:
    build:
      context: ./auth-service
      dockerfile: Dockerfile
    container_name: auth-service
    ports:
      - "3001:3000"
    environment:
      - AWS_REGION=us-east-1
      - AWS_ACCESS_KEY_ID=local
      - AWS_SECRET_ACCESS_KEY=local
      - DYNAMODB_ENDPOINT=http://dynamodb-local:8000
      - USERS_TABLE=Users
      - JWT_SECRET=dev-secret-alkemy-2025
      - PORT=3000
    depends_on:
      - dynamodb-local
    restart: on-failure

  spaces-service:
    build:
      context: ./spaces-service
      dockerfile: Dockerfile
    container_name: spaces-service
    ports:
      - "3002:3000"
    environment:
      - AWS_REGION=us-east-1
      - AWS_ACCESS_KEY_ID=local
      - AWS_SECRET_ACCESS_KEY=local
      - DYNAMODB_ENDPOINT=http://dynamodb-local:8000
      - SPACES_TABLE=Spaces
      - JWT_SECRET=dev-secret-alkemy-2025
      - PORT=3000
    depends_on:
      - dynamodb-local
    restart: on-failure

  reservations-service:
    build:
      context: ./reservations-service
      dockerfile: Dockerfile
    container_name: reservations-service
    ports:
      - "3003:3000"
    environment:
      - AWS_REGION=us-east-1
      - AWS_ACCESS_KEY_ID=local
      - AWS_SECRET_ACCESS_KEY=local
      - DYNAMODB_ENDPOINT=http://dynamodb-local:8000
      - RESERVATIONS_TABLE=Reservations
      - SPACES_TABLE=Spaces
      - JWT_SECRET=dev-secret-alkemy-2025
      - PORT=3000
    depends_on:
      - dynamodb-local
    restart: on-failure